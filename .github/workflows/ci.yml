name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout feature branch for lockfile bootstrap
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore and update lock files
        shell: pwsh
        run: ./scripts/restore.ps1 -UpdateLockFile

      - name: Commit generated lock files
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '**/packages.lock.json'
          if (-not (git diff --cached --quiet)) {
            git commit -m "Update operational kernel lock files"
            git push origin "HEAD:${{ github.head_ref }}"
          }

      - name: Verify formatting and analyzers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/logs | Out-Null
          dotnet format Astra.slnx --verify-no-changes --no-restore --verbosity diagnostic 2>&1 |
            Tee-Object -FilePath artifacts/logs/format.log
          exit $LASTEXITCODE

      - name: Build release
        shell: pwsh
        run: ./scripts/build.ps1 -Configuration Release

      - name: Run all tests
        shell: pwsh
        run: ./scripts/test.ps1 -Configuration Release

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: artifacts/logs
          if-no-files-found: warn
